services:
  postgres:
    image: postgres
    volumes:
      - ./local/db.sql:/docker-entrypoint-initdb.d/01-db.sql
    environment:
      POSTGRES_PASSWORD: "rock4me!!"
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_NAME: "louvorappdb"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "rock4me!!"
      DATABASE_HOST: "postgres"
      DATABASE_PORT: "5432"
      JWT_SECRET: "SECRET"
    ports:
      - "3000:80"
    volumes:
      # Bind-mount only the source for hot reload. node_modules (with its
      # linux-native bcrypt/swc) and dist (built fresh by nest --watch) stay
      # inside the container from the image build — never overlaid by the host.
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy